<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
    width:350px;
    padding:10px;
    font-family:Arial;
}

input{
    width:100%;
    margin-bottom:8px;
    padding:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    margin-top:8px;
}

h3{
    margin-top:0;
}

label{
    display:block;
    margin-top:10px;
    margin-bottom:10px;
}

</style>
</head>

<body>

<h3>IIT KGP ERP</h3>

<input
    id="roll"
    type="password"
    placeholder="Roll Number">

<input
    id="password"
    type="password"
    placeholder="Password">

<input
    id="q1"
    type="password"
    placeholder="Question 1">

<input
    id="a1"
    type="password"
    placeholder="Answer 1">

<input
    id="q2"
    type="password"
    placeholder="Question 2">

<input
    id="a2"
    type="password"
    placeholder="Answer 2">

<input
    id="q3"
    type="password"
    placeholder="Question 3">

<input
    id="a3"
    type="password"
    placeholder="Answer 3">

<label>
    <input
        type="checkbox"
        id="toggleVisibility"
        style="width:auto;">
    Show Details
</label>

<button id="saveBtn">
    Save
</button>

<script src="popup.js"></script>

</body>
</html>
